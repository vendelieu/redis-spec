name: scrape

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force build even if upstream SHAs are unchanged"
        required: false
        default: "false"

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - run: bun install --frozen-lockfile

      - name: Build (detect upstream changes)
        id: build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            bun run src/main.ts --force
          else
            bun run src/main.ts
          fi

      - name: Validate output
        if: steps.build.outputs.changed == 'true'
        run: bun run validate

      - name: Run tests
        if: steps.build.outputs.changed == 'true'
        run: bun test

      - name: Open pull request
        if: steps.build.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          branch: chore/upstream-bump
          delete-branch: true
          commit-message: |
            chore(spec): bump upstream

            redis@${{ steps.build.outputs.redisShaShort }}
            redis-docs@${{ steps.build.outputs.docsShaShort }}
          title: "chore(spec): bump redis@${{ steps.build.outputs.redisShaShort }} redis-docs@${{ steps.build.outputs.docsShaShort }}"
          body: |
            Automated upstream bump.

            * `redis/redis@unstable` → `${{ steps.build.outputs.redisShaShort }}`
            * `redis/docs@main` → `${{ steps.build.outputs.docsShaShort }}`

            Generated by `.github/workflows/scrape.yml`.
          add-paths: |
            output/**
            state/upstream.json
